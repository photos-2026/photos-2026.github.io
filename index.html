<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Drive Photos</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafd;
      --surface: #ffffff;
      --surface-soft: #eef3f8;
      --text: #1f2933;
      --muted: #637083;
      --line: #dde5ef;
      --blue: #1a73e8;
      --green: #1e8e3e;
      --red: #d93025;
      --yellow: #f9ab00;
      --shadow: 0 18px 45px rgba(23, 43, 77, 0.13);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 20px 14px;
      background: var(--surface);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 8px;
      font-size: 22px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .pinwheel {
      width: 34px;
      height: 34px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 3px;
      transform: rotate(45deg);
    }

    .pinwheel span {
      border-radius: 8px 8px 2px 8px;
    }

    .pinwheel span:nth-child(1) { background: var(--blue); }
    .pinwheel span:nth-child(2) { background: var(--green); }
    .pinwheel span:nth-child(3) { background: var(--yellow); }
    .pinwheel span:nth-child(4) { background: var(--red); }

    .nav {
      display: grid;
      gap: 4px;
    }

    .nav button,
    .chip,
    .icon-btn,
    .primary-btn,
    .ghost-btn,
    .danger-btn {
      border: 0;
      cursor: pointer;
    }

    .nav button {
      width: 100%;
      min-height: 44px;
      padding: 0 14px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 13px;
      font-weight: 550;
      text-align: left;
    }

    .nav button.active {
      color: #174ea6;
      background: #e8f0fe;
    }

    .nav svg,
    .toolbar svg,
    .modal-actions svg {
      width: 20px;
      height: 20px;
      stroke-width: 2;
    }

    .storage {
      margin-top: auto;
      padding: 14px;
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .storage-bar {
      height: 7px;
      margin: 11px 0 8px;
      border-radius: 99px;
      overflow: hidden;
      background: #d7e1ee;
    }

    .storage-bar span {
      display: block;
      width: 38%;
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--green), var(--yellow));
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      min-height: 78px;
      padding: 14px 28px;
      background: rgba(248, 250, 253, 0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(221, 229, 239, 0.72);
      display: grid;
      grid-template-columns: minmax(190px, 1fr) minmax(220px, 520px) auto;
      gap: 18px;
      align-items: center;
    }

    .page-title h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .page-title p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .search {
      min-height: 48px;
      padding: 0 16px;
      border-radius: 999px;
      background: #edf2f7;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search svg {
      width: 20px;
      height: 20px;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .primary-btn {
      min-height: 42px;
      border-radius: 999px;
      padding: 0 16px;
      background: var(--blue);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 650;
      box-shadow: 0 10px 20px rgba(26, 115, 232, 0.22);
      white-space: nowrap;
    }

    .icon-btn,
    .ghost-btn,
    .danger-btn {
      min-height: 42px;
      border-radius: 999px;
      padding: 0 13px;
      background: transparent;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    .icon-btn:hover,
    .ghost-btn:hover {
      background: #e9eef6;
      color: var(--text);
    }

    .danger-btn {
      color: var(--red);
    }

    .content {
      padding: 22px 28px 42px;
    }

    .moments {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px 0 22px;
      scrollbar-width: thin;
    }

    .chip {
      flex: 0 0 auto;
      min-height: 38px;
      padding: 0 15px;
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--line);
      font-weight: 600;
    }

    .chip.active {
      color: white;
      background: #202124;
      border-color: #202124;
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
    }

    .section-head span {
      color: var(--muted);
      font-size: 13px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
      grid-auto-flow: dense;
      gap: 7px;
    }

    .photo {
      position: relative;
      min-height: 132px;
      aspect-ratio: 1 / 1;
      border: 0;
      padding: 0;
      overflow: hidden;
      border-radius: 8px;
      background: #dbe4ef;
      cursor: pointer;
      box-shadow: none;
    }

    .photo.wide {
      grid-column: span 2;
      aspect-ratio: 2 / 1;
    }

    .photo.tall {
      grid-row: span 2;
      aspect-ratio: 1 / 2;
    }

    .photo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 220ms ease, filter 220ms ease;
    }

    .photo:hover img {
      transform: scale(1.035);
      filter: brightness(0.88);
    }

    .photo::after {
      content: attr(data-name);
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 30px 10px 9px;
      color: white;
      font-size: 12px;
      font-weight: 650;
      text-align: left;
      background: linear-gradient(0deg, rgba(0, 0, 0, 0.58), transparent);
      opacity: 0;
      transition: opacity 180ms ease;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .photo:hover::after {
      opacity: 1;
    }

    .download-btn {
      position: absolute;
      top: 9px;
      right: 9px;
      z-index: 2;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.92);
      color: #1f2933;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.22);
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 180ms ease, transform 180ms ease, background 180ms ease;
    }

    .download-btn:hover,
    .download-btn:focus-visible {
      background: white;
      outline: none;
    }

    .download-btn svg {
      width: 18px;
      height: 18px;
      stroke-width: 2.2;
    }

    .photo:hover .download-btn,
    .photo:focus-visible .download-btn,
    .download-btn:focus-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .empty {
      min-height: 360px;
      border: 1px dashed #b8c5d5;
      border-radius: 8px;
      display: grid;
      place-items: center;
      padding: 28px;
      background: rgba(255, 255, 255, 0.62);
      text-align: center;
    }

    .empty h2 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 650;
    }

    .empty p {
      max-width: 520px;
      margin: 0 auto 18px;
      color: var(--muted);
      line-height: 1.55;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(15, 23, 42, 0.52);
    }

    .modal.open {
      display: flex;
    }

    .dialog {
      width: min(720px, 100%);
      max-height: min(760px, calc(100vh - 44px));
      overflow: auto;
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .dialog-head {
      padding: 22px 24px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .dialog-head h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
    }

    .dialog-body {
      padding: 0 24px 22px;
    }

    .hint {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.55;
    }

    textarea {
      width: 100%;
      min-height: 170px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      outline: none;
      background: #fbfdff;
      color: var(--text);
      line-height: 1.45;
    }

    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.14);
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      padding-top: 16px;
    }

    .previewer {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      grid-template-rows: auto minmax(0, 1fr);
      background: #111827;
      color: white;
    }

    .previewer.open {
      display: grid;
    }

    .preview-top {
      min-height: 64px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: rgba(17, 24, 39, 0.9);
    }

    .preview-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 650;
    }

    .preview-stage {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .preview-stage img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        padding: 14px 16px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        padding: 0;
      }

      .nav {
        grid-template-columns: 1fr;
      }

      .nav button {
        justify-content: center;
        padding: 0 8px;
      }

      .nav button span {
        display: none;
      }

      .storage {
        display: none;
      }

      .topbar {
        grid-template-columns: 1fr;
        padding: 14px 16px;
      }

      .toolbar {
        justify-content: flex-start;
        overflow-x: auto;
      }

      .content {
        padding: 18px 16px 32px;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
      }

      .photo.wide,
      .photo.tall {
        grid-column: span 1;
        grid-row: span 1;
        aspect-ratio: 1 / 1;
      }
    }

    @media (max-width: 520px) {
      .topbar {
        gap: 12px;
      }

      .page-title h1 {
        font-size: 21px;
      }

      .ghost-btn,
      .danger-btn {
        min-height: 40px;
        padding: 0 12px;
      }

      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .dialog-head,
      .dialog-body {
        padding-left: 18px;
        padding-right: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand" aria-label="My Drive Photos">
        <div class="pinwheel" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
        <span>My Photos</span>
      </div>

      <nav class="nav" aria-label="Main navigation">
        <button class="active" type="button" title="Photos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="16" rx="3"></rect><circle cx="8.5" cy="9.5" r="1.5"></circle><path d="m21 16-5-5L5 20"></path></svg>
          <span>Photos</span>
        </button>
      </nav>

      <div class="storage">
        <strong>My gallery</strong>
        <div class="storage-bar"><span></span></div>
        <span id="sideCount">41 public photos</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="page-title">
          <h1>Photos</h1>
          <p>Your public Google Drive photo wall</p>
        </div>

        <label class="search" aria-label="Search photos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
          <input id="searchInput" type="search" placeholder="Search your photos" autocomplete="off" />
        </label>

        <div class="toolbar">
          <button class="icon-btn" id="shuffleBtn" type="button" title="Shuffle layout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 3h5v5"></path><path d="M4 20 21 3"></path><path d="M21 16v5h-5"></path><path d="M15 15l6 6"></path><path d="M4 4l5 5"></path></svg>
          </button>
        </div>
      </header>

      <section class="content">
        <div class="moments" aria-label="Photo filters">
          <button class="chip active" type="button" data-filter="all">All</button>
        </div>

        <div class="section-head">
          <h2 id="galleryTitle">Today</h2>
          <span id="photoCount">0 photos</span>
        </div>

        <div id="gallery" class="gallery" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script>
    const gallery = document.getElementById("gallery");
    const photoCount = document.getElementById("photoCount");
    const sideCount = document.getElementById("sideCount");
    const searchInput = document.getElementById("searchInput");

    const driveLinks = [
      "https://drive.google.com/file/d/1S3DpFjwmaUk_j0PQ1rmlfkRbIGYZ2BiD/view?usp=sharing",
      "https://drive.google.com/file/d/1nPKB-diUUiwQb_YzUSngznzuF71KQgF8/view?usp=sharing",
      "https://drive.google.com/file/d/1BcJn6nvER1FryrTuiWH4y_aChGgav4sn/view?usp=sharing",
      "https://drive.google.com/file/d/1i7vdM21PWenrTHBLY2hX4omdW77iN32H/view?usp=sharing",
      "https://drive.google.com/file/d/14_Ntjt6AUnL7gujFaByf8X47RsrBla2K/view?usp=sharing",
      "https://drive.google.com/file/d/139TAEBsbFP3YSjsDcg59SP4SHv7mQR6v/view?usp=sharing",
      "https://drive.google.com/file/d/1HdsbRMAc29onTVSbhfaHpbIbchIRI14k/view?usp=sharing",
      "https://drive.google.com/file/d/12vjvhLJCFYzjWzSXLGwymBpsywWEJRRP/view?usp=sharing",
      "https://drive.google.com/file/d/1gEpbmlPIP-uaSGc9VeEwmZx37-QYim6Y/view?usp=sharing",
      "https://drive.google.com/file/d/1WFgSg6jhVfELxedVT2uVL4zZLuoQaSUD/view?usp=sharing",
      "https://drive.google.com/file/d/18Jt4o6T6YL8u9UC2snc0eGhXoqHWMXM-/view?usp=sharing",
      "https://drive.google.com/file/d/1A8WjFNTfRCXkYcRPJtrPwNDxoismUm6G/view?usp=sharing",
      "https://drive.google.com/file/d/1IsQdytAQkBYzoDwbd-u4pqrgPzD52fRJ/view?usp=sharing",
      "https://drive.google.com/file/d/1-sMixuNQEmsBy3Dp-bzk4rLgzyIcv_um/view?usp=sharing",
      "https://drive.google.com/file/d/1XG1huplknvaiL2wsPLXuLQqQfgkOHg90/view?usp=sharing",
      "https://drive.google.com/file/d/1DEcoQ2gD06Ubbqj7QQab6yNmAybTSgvg/view?usp=sharing",
      "https://drive.google.com/file/d/1zqVi5Zt0x0R_spHjxXnPI7O2fNPoQ60M/view?usp=sharing",
      "https://drive.google.com/file/d/1FqJA8AnjFNynqqgDQ-9oMMjZZ7zNpF75/view?usp=sharing",
      "https://drive.google.com/file/d/12h8u2O3sEP5x6J00vhnLIJrO3Ab8gaMv/view?usp=sharing",
      "https://drive.google.com/file/d/1kKNuDbTPLWlR_cJbbZ6LX1gPQW3i7mEX/view?usp=sharing",
      "https://drive.google.com/file/d/1b0AScOIVofCUe56cGTBMaSMQAWoixr63/view?usp=sharing",
      "https://drive.google.com/file/d/1R4bueMJVtrIIpnqXiIqO9gszS4Dw2ORi/view?usp=sharing",
      "https://drive.google.com/file/d/1UIsvYzPkHOwiGCvuQ45N5efrr7DoqOqS/view?usp=sharing",
      "https://drive.google.com/file/d/1p6wy9nKIjzP9yvRf6sDMcWuNCzW4yzMy/view?usp=sharing",
      "https://drive.google.com/file/d/1U7QxH222efiMirO8K3ciOIfNNXSrnS-f/view?usp=sharing",
      "https://drive.google.com/file/d/1O1gofOBfSLH9qpPmF6g8pXpU3vrgPdY3/view?usp=sharing",
      "https://drive.google.com/file/d/16M8EJvcwlRjupi5MrayMkSe6pEJfnVoQ/view?usp=sharing",
      "https://drive.google.com/file/d/1lSO7mCPSJjPtZvU_TbC2fY0RoZUae18N/view?usp=sharing",
      "https://drive.google.com/file/d/1Hxox9b3r26EqpaVHLbfChwoFpeau9I0M/view?usp=sharing",
      "https://drive.google.com/file/d/1aHTV_xdpGUyLjLtMvxC8GTguBptWIe9z/view?usp=sharing",
      "https://drive.google.com/file/d/1okN9kfdlkD2wiRGAgIGfYr8OSo9lUxWY/view?usp=sharing",
      "https://drive.google.com/file/d/14k43tGEEsbes447I-vXBEDkltp0bLw2F/view?usp=sharing",
      "https://drive.google.com/file/d/1Oyr2f30tHJa_05xu4mAELNX5WfMkBTRg/view?usp=sharing",
      "https://drive.google.com/file/d/1C2lYIr6jMN0Cibe0K6wFuUGQ_c-tiFTm/view?usp=sharing",
      "https://drive.google.com/file/d/1R5wVsHNmm9b-lrGaOTUyRPgI4dDijsaL/view?usp=sharing",
      "https://drive.google.com/file/d/1G1PIruYORccds8OPKytdfsBZv4K7oXKr/view?usp=sharing",
      "https://drive.google.com/file/d/1sBKLlnoEATOTJZaAhy-iYRjyM_f8APvq/view?usp=sharing",
      "https://drive.google.com/file/d/1Qi7-0S59HIf8klvKGM_xjL2AUQBaSfaH/view?usp=sharing",
      "https://drive.google.com/file/d/1MzlUvQmjdQadVSTs19jgipgOKtGIcs7c/view?usp=sharing",
      "https://drive.google.com/file/d/1C7JCv4tnYPrskLjrSakB58Kth1wOyLqw/view?usp=sharing",
      "https://drive.google.com/file/d/1WCbc5e2j1CpaArZug0Cm3gOEbma7fFSS/view?usp=sharing"
    ];

    const savedPhotos = driveLinks.map(toPhoto);
    let layoutSeed = 0;

    function getDriveId(url) {
      const patterns = [
        /\/file\/d\/([a-zA-Z0-9_-]+)/,
        /[?&]id=([a-zA-Z0-9_-]+)/,
        /\/open\?id=([a-zA-Z0-9_-]+)/
      ];
      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match) return match[1];
      }
      return "";
    }

    function toPhoto(rawLink, index) {
      const link = rawLink.trim();
      const driveId = getDriveId(link);
      const src = driveId ? `https://drive.google.com/thumbnail?id=${driveId}&sz=w1200` : link;
      const full = driveId ? `https://drive.google.com/uc?export=view&id=${driveId}` : link;
      const download = driveId ? `https://drive.google.com/uc?export=download&id=${driveId}` : link;
      return {
        id: driveId || `${Date.now()}-${index}-${link.length}`,
        name: `Photo ${index + 1}`,
        number: index + 1,
        src,
        full,
        download,
        link,
        addedAt: "2026-07-13"
      };
    }

    function render() {
      const query = searchInput.value.trim().toLowerCase();
      const photos = savedPhotos.filter(photo => {
        if (!query) return true;

        if (/^\d+$/.test(query)) {
          const numberText = String(photo.number);
          return numberText === query || (numberText.startsWith(query) && !numberText.endsWith("0"));
        }

        return photo.name.toLowerCase().includes(query);
      });

      gallery.innerHTML = "";
      photoCount.textContent = `${photos.length} ${photos.length === 1 ? "photo" : "photos"}`;
      sideCount.textContent = `${savedPhotos.length} public photos`;

      if (!photos.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.style.gridColumn = "1 / -1";
        empty.innerHTML = `
          <div>
            <h2>No photos found</h2>
            <p>Try another search term to find one of the 41 photos in this gallery.</p>
          </div>
        `;
        gallery.appendChild(empty);
        return;
      }

      photos.forEach((photo, index) => {
        const tile = document.createElement("div");
        const pattern = (index + layoutSeed) % 11;
        tile.className = `photo ${pattern === 1 || pattern === 8 ? "wide" : pattern === 5 ? "tall" : ""}`;
        tile.tabIndex = 0;
        tile.setAttribute("role", "link");
        tile.setAttribute("aria-label", `Open ${photo.name} in Google Drive`);
        tile.dataset.name = photo.name;
        tile.innerHTML = `
          <img src="${photo.src}" alt="${photo.name}" loading="lazy">
          <a class="download-btn" href="${photo.download}" download="${photo.name}.jpg" target="_blank" rel="noopener noreferrer" title="Download ${photo.name}" aria-label="Download ${photo.name}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>
          </a>
        `;
        const downloadBtn = tile.querySelector(".download-btn");
        downloadBtn.addEventListener("click", () => {
          setTimeout(() => downloadBtn.blur(), 0);
        });
        tile.addEventListener("mouseleave", () => {
          if (document.activeElement === downloadBtn) downloadBtn.blur();
        });
        tile.addEventListener("click", event => {
          if (event.target.closest(".download-btn")) return;
          window.open(photo.link, "_blank", "noopener,noreferrer");
        });
        tile.addEventListener("keydown", event => {
          if (event.target.closest(".download-btn")) return;
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            window.open(photo.link, "_blank", "noopener,noreferrer");
          }
        });
        gallery.appendChild(tile);
      });
    }

    document.getElementById("shuffleBtn").addEventListener("click", () => {
      layoutSeed = (layoutSeed + 3) % 11;
      render();
    });
    searchInput.addEventListener("input", render);

    document.querySelectorAll(".chip").forEach(chip => {
      chip.addEventListener("click", () => {
        document.querySelectorAll(".chip").forEach(item => item.classList.remove("active"));
        chip.classList.add("active");
      });
    });

    render();
  </script>
</body>
</html>
